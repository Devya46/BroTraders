<!-- ========== Top Firm + Premium Giveaway Section ========== -->
<section class="best-deals-hero premium-combined">
  <div class="best-deals-content">
    <!-- LEFT CONTENT -->
    <div class="hero-text">
      <h1>Top Firm Comparison</h1>
      <p>
        Looking to break down prop firms by their metrics and features? This
        Master Sheet lets you compare every account from every firm in one place
        and make confident decisions.
      </p>
    </div>

    <!-- RIGHT FORM -->
    <div class="giveaway-card">
      <h2>Enter The Giveaway</h2>

      <form id="giveawayForm">
        <div class="form-row">
          <input type="text" placeholder="First Name" required />
          <input type="text" placeholder="Last Name" required />
        </div>

        <input type="email" placeholder="Email Address" required />

        <!-- Marketing Checkbox -->
        <label class="checkbox-container">
          <input type="checkbox" id="marketingCheck" />
          <span>
            I agree to receive recurring automated marketing text messages (e.g.
            promotional offers) at the phone number provided. Consent is not a
            condition to purchase. Msg & data rates may apply. Msg frequency
            varies. Reply HELP for help and STOP to cancel.
          </span>
        </label>

        <!-- REQUIRED Rules Checkbox -->
        <label class="checkbox-container">
          <input type="checkbox" id="rulesCheck" />
          <span>
            By checking this box, you acknowledge and consent to all rules.
          </span>
        </label>

        <button type="submit" id="submitBtn" disabled>Secure My Entry →</button>
      </form>
    </div>
  </div>
</section>

<style>
  /* ===== Section Layout ===== */
  .premium-combined {
    padding: 100px 20px;
    background:
      radial-gradient(circle at top left, #1e40af 0%, transparent 50%),
      linear-gradient(180deg, #0b1d3a 0%, #030712 100%);
    color: #ffffff;
  }

  .best-deals-content {
    max-width: 1300px;
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 60px;
    flex-wrap: wrap;
  }

  /* LEFT TEXT */
  .hero-text {
    flex: 1;
    min-width: 300px;
  }

  .hero-text h1 {
    font-size: clamp(42px, 6vw, 70px);
    font-weight: 800;
    margin-bottom: 20px;
  }

  .hero-text p {
    font-size: 18px;
    line-height: 1.6;
    opacity: 0.9;
  }

  /* FORM CARD */
  .giveaway-card {
    flex: 1;
    min-width: 350px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 40px rgba(0, 150, 255, 0.2);
  }

  /* FORM */
  #giveawayForm {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-row {
    display: flex;
    gap: 15px;
  }

  .form-row input {
    flex: 1;
  }

  #giveawayForm input[type="text"],
  #giveawayForm input[type="email"] {
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.08);
    color: #ffffff;
    outline: none;
    font-size: 15px;
  }

  #giveawayForm input::placeholder {
    color: rgba(255, 255, 255, 0.7);
  }

  #giveawayForm input:focus {
    border-color: #00c2ff;
    box-shadow: 0 0 12px rgba(0, 194, 255, 0.6);
  }

  /* CHECKBOX */
  .checkbox-container {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    line-height: 1.5;
  }

  .checkbox-container input {
    margin-top: 4px;
    cursor: pointer;
  }

  /* ===== PREMIUM 3D BUTTON ===== */
  #submitBtn {
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(90deg, #00c2ff, #1e90ff);
    color: white;
    border: none;
    cursor: not-allowed;
    opacity: 0.6;
    transition: all 0.25s ease;

    box-shadow:
      0 6px 0 #0b5ed7,
      0 12px 20px rgba(0, 194, 255, 0.4);
  }

  #submitBtn.active {
    cursor: pointer;
    opacity: 1;
  }

  #submitBtn.active:hover {
    background: white;
    color: #0b0f2a;
    border: 3px solid #00c2ff;

    box-shadow:
      0 4px 0 #00a8e6,
      0 15px 25px rgba(0, 194, 255, 0.6);

    transform: translateY(2px);
  }

  #submitBtn.active:active {
    transform: translateY(6px);
    box-shadow:
      0 2px 0 #00a8e6,
      0 8px 15px rgba(0, 194, 255, 0.4);
  }

  /* MOBILE */
  @media (max-width: 992px) {
    .best-deals-content {
      flex-direction: column;
    }

    .form-row {
      flex-direction: column;
    }
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const marketingCheck = document.getElementById("marketingCheck");
    const rulesCheck = document.getElementById("rulesCheck");
    const submitBtn = document.getElementById("submitBtn");
    const form = document.getElementById("giveawayForm");

    function validateCheckboxes() {
      if (marketingCheck.checked && rulesCheck.checked) {
        submitBtn.disabled = false;
        submitBtn.classList.add("active");
      } else {
        submitBtn.disabled = true;
        submitBtn.classList.remove("active");
      }
    }

    marketingCheck.addEventListener("change", validateCheckboxes);
    rulesCheck.addEventListener("change", validateCheckboxes);

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      alert("Form Submitted Successfully!");
    });
  });
</script>
