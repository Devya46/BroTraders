<!-- ================= Largest Deal Section ================= -->
<section class="largest-deal-section">
  <h2 class="lds-title">Today’s Biggest & Largest Deals!</h2>

  <div class="carousel">
    <button class="nav prev">&#10094;</button>
    <div class="carousel-track" id="carouselTrack"></div>
    <button class="nav next">&#10095;</button>
  </div>
</section>

<style>
  .largest-deal-section {
    padding: 120px 0;
    background:
      radial-gradient(circle at top center, #1e40af 0%, transparent 60%),
      linear-gradient(180deg, #0b1d3a 0%, #030712 100%);
    font-family: "DM Mono", monospace;
    color: #fff;
    overflow: hidden;
  }

  .lds-title {
    text-align: center;
    font-size: 34px;
    margin-bottom: 70px;
  }

  .carousel {
    position: relative;
    max-width: 1400px;
    margin: auto;
    overflow: hidden;
  }

  .carousel-track {
    display: flex;
    align-items: stretch;
    transition: transform 0.7s cubic-bezier(0.77, 0, 0.18, 1);
  }

  /* ===== CARD ===== */
  .card {
    min-width: 48%;
    margin: 0 20px;
    border-radius: 28px;
    background: rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(25px);
    display: flex;
    transition: 0.6s ease;
    opacity: 0.5;
    transform: scale(0.9);
  }

  .card.active {
    opacity: 1;
    transform: scale(1);
    box-shadow: 0 0 70px rgba(0, 194, 255, 0.25);
  }
  /* ================= SOLID BORDER RUNNER ================= */

  .card.active {
    position: relative;
    z-index: 2;
  }

  .card.active::before {
    content: "";
    position: absolute;
    inset: -12px;
    border-radius: 30px;
    padding: 3px;

    background:
      linear-gradient(90deg, #00c2ff, #00c2ff) top,
      linear-gradient(180deg, #00c2ff, #00c2ff) right,
      linear-gradient(270deg, #00c2ff, #00c2ff) bottom,
      linear-gradient(360deg, #00c2ff, #00c2ff) left;

    background-size:
      200% 3px,
      3px 200%,
      200% 3px,
      3px 200%;

    background-repeat: no-repeat;

    animation: borderRun 2.5s linear infinite;

    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;

    pointer-events: none;
  }

  @keyframes borderRun {
    0% {
      background-position:
        -200% 0,
        100% -200%,
        200% 100%,
        0 200%;
    }

    100% {
      background-position:
        200% 0,
        100% 200%,
        -200% 100%,
        0 -200%;
    }
  }
  /* LEFT SIDE */
  .card-left {
    flex: 1.1;
    padding: 50px 30px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .card-logo {
    height: 80px;
    object-fit: contain;
    margin-bottom: 18px;
  }

  .lucid-logo {
    height: 120px !important;
  }

  .card-left h3 {
    font-size: 22px;
  }

  /* DIVIDER */
  .card-divider {
    width: 1px;
    background: linear-gradient(to bottom, transparent, #00c2ff, transparent);
    opacity: 0.6;
  }

  /* RIGHT SIDE */
  .card-right {
    flex: 1.9;
    padding: 50px 45px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .discount {
    font-size: 30px;
    color: #00c2ff;
    margin-bottom: 18px;
    font-weight: bold;
  }
  /* ================= DELAYED DROP DISCOUNT ================= */

  /* Default hidden state */
  .card .discount {
    opacity: 0;
    transform: translateY(-50px);
  }

  /* Animate only when active */
  .card.active .discount {
    animation: delayedDrop 0.8s cubic-bezier(0.22, 1.2, 0.36, 1) forwards;
    animation-delay: 0.9s; /* ⬅ Change this for more/less wait */
  }

  @keyframes delayedDrop {
    0% {
      opacity: 0;
      transform: translateY(-50px);
    }
    70% {
      opacity: 1;
      transform: translateY(8px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .details {
    opacity: 0.85;
    line-height: 1.7;
    margin-bottom: 25px;
  }

  .code {
    margin-bottom: 25px;
    font-size: 15px;
  }

  .copy-text {
    color: #00c2ff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  .copy-text:hover {
    color: #ffffff;
  }

  .btn {
    padding: 14px 40px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg, #00c2ff, #1e90ff);
    color: #fff;
    font-weight: 600;
    transition: 0.3s;
    width: fit-content;
  }

  .btn:hover {
    transform: translateY(-3px);
    background: white;
    color: #0b0f2a;
  }

  /* ARROWS */
  .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 32px;
    background: none;
    border: none;
    color: #00c2ff;
    cursor: pointer;
    z-index: 10;
  }

  .prev {
    left: 0;
  }
  .next {
    right: 0;
  }

  /* MOBILE */
  @media (max-width: 900px) {
    .card {
      min-width: 90%;
      flex-direction: column;
    }

    .card-divider {
      height: 1px;
      width: 100%;
      background: linear-gradient(to right, transparent, #00c2ff, transparent);
    }

    .card-left,
    .card-right {
      text-align: center;
      padding: 35px 25px;
    }

    .btn {
      margin: auto;
    }
  }
</style>

<script>
  const deals = [
    {
      name: "Apex Trader Funding",
      logo: "https://onlypropfirms.com/wp-content/uploads/2025/05/Layer_1.png",
      discount: "90% Off",
      details:
        "All Evals! One Day To Pass.<br>No Consistency Rule in Evaluation!<br>Resets $50.",
      code: "PW",
    },
    {
      name: "Lucid Trading",
      logo: "https://onlypropfirms.com/wp-content/uploads/2025/10/lucidicon-1.png",
      discount: "40% - 50% Off",
      details: "40% Off New Lucid Black Plans.<br>50% Off on New Accounts.",
      code: "PW",
    },
    {
      name: "Funded Futures Network",
      logo: "https://onlypropfirms.com/wp-content/uploads/2025/08/ffnf.svg",
      discount: "50% Off",
      details: "No Activation Fees + BOGO.",
      code: "PW",
    },
    {
      name: "Tradeify",
      logo: "https://onlypropfirms.com/wp-content/uploads/2025/12/White-logo-no-background-scaled.png",
      discount: "40% Off",
      details:
        "40% Off The 150K Select Plan.<br>Choose Day-1 or 5-Day Payouts!",
      code: "PW",
    },
    {
      name: "Take Profit Trader",
      logo: "https://onlypropfirms.com/wp-content/uploads/2025/07/take-profit-trader-logo.svg",
      discount: "40% Off",
      details: "All Accounts & No Activation Fee!",
      code: "PW",
    },
    {
      name: "TradeDay",
      logo: "https://onlypropfirms.com/wp-content/uploads/2025/07/dt_logo3.svg",
      discount: "40% Off",
      details: "All Accounts! No Activation Fees!<br>Choose Drawdown Type!",
      code: "PW",
    },
    {
      name: "Legends Trading",
      logo: "https://onlypropfirms.com/wp-content/uploads/2025/07/legends-sa_fnl.svg",
      discount: "25% Off",
      details: "New Apprentice Evaluation Accounts Rules!<br>1 Day To Pass!",
      code: "PW",
    },
    {
      name: "WarBux",
      logo: "https://onlypropfirms.com/wp-content/uploads/2025/11/Rectangle.png",
      discount: "20% Off",
      details: "All Accounts! No Activation Fees!<br>No Profit Targets!",
      code: "WAR",
    },
  ];

  const track = document.getElementById("carouselTrack");

  deals.forEach((deal) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-left">
        <img src="${deal.logo}" 
             class="card-logo ${deal.name === "Lucid Trading" ? "lucid-logo" : ""}" 
             alt="${deal.name}">
        <h3>${deal.name}</h3>
      </div>

      <div class="card-divider"></div>

      <div class="card-right">
        <div class="discount">${deal.discount}</div>
        <div class="details">${deal.details}</div>
        <div class="code">
          Copy Code:
          <span class="copy-text" data-code="${deal.code}">${deal.code}</span>
        </div>
        <button class="btn">Get Deal</button>
      </div>
    `;
    track.appendChild(card);
  });

  let index = 0;
  const cards = document.querySelectorAll(".card");

  function updateCarousel() {
    const cardWidth = cards[0].offsetWidth + 40;
    track.style.transform = `translateX(calc(50% - ${cardWidth / 2}px - ${index * cardWidth}px))`;

    cards.forEach((card) => card.classList.remove("active"));
    cards[index].classList.add("active");
  }

  document.querySelector(".next").onclick = () => {
    index = (index + 1) % deals.length;
    updateCarousel();
  };

  document.querySelector(".prev").onclick = () => {
    index = (index - 1 + deals.length) % deals.length;
    updateCarousel();
  };

  window.addEventListener("load", updateCarousel);
  window.addEventListener("resize", updateCarousel);

  document.addEventListener("click", function (e) {
    if (e.target.classList.contains("copy-text")) {
      const code = e.target.getAttribute("data-code");
      navigator.clipboard.writeText(code).then(() => {
        const original = e.target.textContent;
        e.target.textContent = "Copied! ✅";
        e.target.style.color = "#00ff88";
        setTimeout(() => {
          e.target.textContent = original;
          e.target.style.color = "#00c2ff";
        }, 1500);
      });
    }
  });
</script>
