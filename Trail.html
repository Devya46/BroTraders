<section class="zx-section">
  <h2 class="zx-title">Favorite Firms</h2>
  <p class="zx-sub">
    Compare prop firms and filter platforms to find the best option.
  </p>

  <div class="zx-table-wrap">
    <table id="zx-table">
      <thead>
        <tr>
          <th class="sticky-logo">Logo</th>

          <th class="sticky-firm">Firm</th>

          <th data-key="account" draggable="true">
            Account<br /><select class="filter" data-key="account"></select>
          </th>

          <th data-key="goal" draggable="true">Goal</th>

          <th data-key="ddt" draggable="true">
            DDT<br /><select class="filter" data-key="ddt"></select>
          </th>

          <th data-key="dd" draggable="true">Max DD</th>

          <th data-key="mindays" draggable="true">Min Days</th>

          <th data-key="eval" draggable="true">Evaluation</th>

          <th data-key="activation" draggable="true">Activation</th>

          <th data-key="truecost" draggable="true">True Cost</th>

          <th data-key="discount" draggable="true">Discount</th>

          <th draggable="true">Code</th>

          <th data-key="platform" draggable="true">
            Platforms<br /><select
              class="filter"
              data-key="platform"
              multiple
            ></select>
          </th>

          <th data-key="country" draggable="true">
            Country<br /><select class="filter" data-key="country"></select>
          </th>

          <th data-key="maxaccounts" draggable="true">Max Accounts</th>

          <th draggable="true">Firm Page</th>

          <th draggable="true">Website</th>
        </tr>
      </thead>

      <tbody></tbody>
    </table>
  </div>
</section>

  .zx-section {
    padding: 70px 120px;

    max-height: 650px;
  }

  #zx-table {
    width: 100%;
    min-width: 1700px;
    border-collapse: collapse;
    background: black;
    color: white;
  }

  #zx-table th {
    background: #0f172a;
    padding: 12px;
    font-size: 14px;
    position: sticky;
    top: 0;
    z-index: 5;
    text-align: center;
    cursor: pointer;
  }

  }

  .filter {

    background: #0f172a;
    color: white;
    border: 1px solid #1e293b;

  .sticky-logo {
    position: sticky;
    left: 0;
    background: #071327;
    z-index: 6;
  }

  .sticky-firm {
    position: sticky;
    left: 70px;
    background: #071327;
    z-index: 6;

  .zx-logo {

  .zx-code {
    background: #1e293b;

    padding: 6px 12px;

    top: 0;
    background: #0f172a;
    z-index: 5;
  }

  #zx-table th.sticky-logo,

    left: 0;
    z-index: 6;
    background: #071327;
    width: 70px;

  #zx-table th.sticky-firm,

    position: sticky;
    left: 70px;
    z-index: 6;
    background: #071327;
    min-width: 200px;
  }

  /* prevent overlap glitch */
  #zx-table {
    border-collapse: separate;
    border-spacing: 0;

  /* RENDER */

  const tbody = document.querySelector("#zx-table tbody");

  function k(n) {
    return n / 1000 + "K";
  }

  function flag(c) {
    if (c === "USA") return "🇺🇸";
    if (c === "UK") return "🇬🇧";
    return "";
  }

  function render(data) {
    tbody.innerHTML = "";

    data.sort((a, b) => a.truecost - b.truecost);

    data.forEach((f) => {
      tbody.innerHTML += `

<tr>

<td class="sticky-logo">
<img src="${f.logo}" class="zx-logo">
</td>

<td class="sticky-firm">
${f.firm}
</td>

<td>${k(f.account)}</td>

<td>$${f.goal}</td>

<td>${f.ddt}</td>

<td>$${f.dd}</td>

<td>${f.mindays}</td>

<td>$${f.eval}</td>

<td>$${f.activation}</td>

<td>$${f.truecost}</td>

<td>${f.discount}</td>

<td><button class="zx-code" onclick="copyCode(this,'${f.code}')">${f.code}</button></td>

<td>${f.platform}</td>

<td>${flag(f.country)} ${f.country}</td>

<td>${f.maxaccounts}</td>

<td><a href="${f.firmpage}" class="zx-btn">Firm Page</a></td>

<td><a href="${f.website}" target="_blank" class="zx-btn">Visit</a></td>

</tr>

`;
    });
  }

  render(firms);

  function copyCode(btn, code) {
    navigator.clipboard.writeText(code);

    btn.innerText = "Copied";

    setTimeout(() => (btn.innerText = code), 1200);
  }
